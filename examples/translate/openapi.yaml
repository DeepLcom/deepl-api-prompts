openapi: 3.1.0
info:
  title: DeepL API — Translate endpoint
  description: Partial OpenAPI spec covering the /v2/translate endpoint only. For the full spec see /schemas/openapi.json.
  version: "2.0"
  contact:
    name: DeepL API Support
    url: https://support.deepl.com

servers:
  - url: https://api-free.deepl.com/v2
    description: Free tier (API keys ending in :fx)
  - url: https://api.deepl.com/v2
    description: Paid tier

security:
  - deeplAuthKey: []

paths:
  /translate:
    post:
      operationId: translateText
      summary: Translate text strings
      description: |
        Translates one or more text strings. Up to 50 strings and 130,000 characters per request.
        The response preserves input order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslateRequest'
            examples:
              single:
                summary: Translate a single string
                value:
                  text:
                    - "Hello, world!"
                  target_lang: DE
              multiple:
                summary: Translate multiple strings with formality
                value:
                  text:
                    - "Good morning"
                    - "How are you?"
                  source_lang: EN
                  target_lang: DE
                  formality: prefer_less
      responses:
        '200':
          description: Successful translation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateResponse'
              example:
                translations:
                  - detected_source_language: EN
                    text: "Hallo, Welt!"
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '456':
          $ref: '#/components/responses/QuotaExceeded'
        '5XX':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    deeplAuthKey:
      type: apiKey
      in: header
      name: Authorization
      description: "Value must be: `DeepL-Auth-Key <your-key>`"

  schemas:
    TranslateRequest:
      type: object
      required:
        - text
        - target_lang
      properties:
        text:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 50
          description: Array of strings to translate.
          example: ["Hello, world!"]
        target_lang:
          type: string
          description: Target language code (uppercase, e.g. DE, FR, PT-BR).
          example: DE
        source_lang:
          type: string
          description: Source language code. Omit to auto-detect.
          example: EN
        formality:
          type: string
          enum: [default, more, less, prefer_more, prefer_less]
          description: Controls formality register. Only supported by certain target languages.
          default: default
        context:
          type: string
          description: Additional context to improve translation quality. Not translated itself; does not count against quota.
        glossary_id:
          type: string
          format: uuid
          description: ID of an existing glossary to apply. Requires source_lang to be set.
        tag_handling:
          type: string
          enum: [html, xml]
          description: Set to "html" or "xml" to preserve markup during translation.
        split_sentences:
          type: string
          enum: ["0", "1", nonewlines]
          default: "1"
          description: Controls sentence splitting. Use "0" for already-segmented content.
        preserve_formatting:
          type: boolean
          default: false
          description: Set to true to disable DeepL's formatting corrections.
        splitting_tags:
          type: array
          items:
            type: string
          description: (xml mode) Tags that mark sentence boundaries.
        non_splitting_tags:
          type: array
          items:
            type: string
          description: (xml mode) Inline tags that should not split sentences.
        ignore_tags:
          type: array
          items:
            type: string
          description: (xml mode) Tags whose content must not be translated.

    TranslateResponse:
      type: object
      required:
        - translations
      properties:
        translations:
          type: array
          items:
            $ref: '#/components/schemas/Translation'

    Translation:
      type: object
      required:
        - text
        - detected_source_language
      properties:
        detected_source_language:
          type: string
          description: Detected or confirmed source language code.
          example: EN
        text:
          type: string
          description: Translated text.
          example: "Hallo, Welt!"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

  responses:
    BadRequest:
      description: Bad request — invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: "Parameter 'target_lang' not specified."
    Forbidden:
      description: Authorization failed — check your API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: "Authorization failure, check authentication key"
    TooManyRequests:
      description: Too many requests — apply exponential back-off and retry
    QuotaExceeded:
      description: Character quota for this billing period has been exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: "Quota exceeded"
    ServerError:
      description: Internal server error — retry later
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
